apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  namespace: ivolve

spec:
  replicas: 2

  # The namespace quota allows only one Node.js Pod beside MySQL.
  # Recreate prevents the rollout from requiring an additional surge Pod.
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: nodejs-app

  template:
    metadata:
      labels:
        app: nodejs-app

    spec:
      tolerations:
        - key: node
          operator: Equal
          value: worker
          effect: NoSchedule

      initContainers:
        - name: init-mysql-database
          image: mysql:8.0
          imagePullPolicy: IfNotPresent

          command:
            - sh
            - -c

          args:
            - |
              set -eu

              echo "Waiting for MySQL at ${DB_HOST}:3306..."

              until mysql \
                --protocol=TCP \
                -h "${DB_HOST}" \
                -P 3306 \
                -u root \
                -p"${MYSQL_ROOT_PASSWORD}" \
                -e "SELECT 1;" >/dev/null 2>&1
              do
                echo "MySQL is not ready yet..."
                sleep 3
              done

              echo "MySQL is ready."
              echo "Creating the ivolve database and application user..."

              mysql \
                --protocol=TCP \
                -h "${DB_HOST}" \
                -P 3306 \
                -u root \
                -p"${MYSQL_ROOT_PASSWORD}" <<SQL
              CREATE DATABASE IF NOT EXISTS \`ivolve\`;

              CREATE USER IF NOT EXISTS
                '${DB_USER}'@'%'
                IDENTIFIED BY '${DB_PASSWORD}';

              ALTER USER
                '${DB_USER}'@'%'
                IDENTIFIED BY '${DB_PASSWORD}';

              GRANT ALL PRIVILEGES
                ON \`ivolve\`.*
                TO '${DB_USER}'@'%';

              FLUSH PRIVILEGES;
              SQL

              echo "Database initialization completed successfully."

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_HOST

            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD

            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD

      containers:
        - name: nodejs-app
          image: mostafa760/ivolve-node-mysql:lab9
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: mysql-config

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DB_PASSWORD

          volumeMounts:
            - name: app-logs
              mountPath: /app/logs

          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

      volumes:
        - name: app-logs
          persistentVolumeClaim:
            claimName: app-logs-pvc
